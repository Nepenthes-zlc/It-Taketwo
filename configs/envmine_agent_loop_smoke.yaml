- name: envmine_lowlevel
  _target_: envmine_verl.agent_loop.EnvMineLowLevelAgentLoop
  envmine:
    batch_config: mc_runtime/EnvMine/configs/qwen_batch_lowlevel.json
    tasks: ConstructScene/generated/generated_tasks.json
    pack_src: ConstructScene/generated/datapacks/multiagent_scene_pack
    log_dir: mc_runtime/EnvMine/logs
    lock_dir: runs/locks
    output_root: runs/online_envmine_smoke
    acquire_timeout: 120
    max_steps: 2
    action_ticks: 2
    capture_ticks: 1
    capture_render_frames: 1
    pov_camera_settle_ticks: 8
    pov_extra_settle_ticks: 4
    pov_settle_render_frames: 4
    capture_timeout: 60
    hide_hud: true
    refresh_pack: false
    randomize_starts: false
    start_position_jitter: 0.0
    start_yaw_jitter: 0.0
    write_debug_images: false
    keep_extra_records: false
    success_reward: 1.0
    failure_reward: 0.0
    invalid_action_penalty: 0.05
    step_penalty: 0.0