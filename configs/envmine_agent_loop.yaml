- name: envmine_lowlevel
  _target_: envmine_verl.agent_loop.EnvMineLowLevelAgentLoop
  envmine:
    batch_config: EnvMine/configs/qwen_batch_lowlevel.json
    tasks: ConstructScene/generated/generated_tasks.json
    pack_src: ConstructScene/generated/datapacks/multiagent_scene_pack
    log_dir: EnvMine/logs
    lock_dir: runs/locks
    output_root: runs/online_envmine
    acquire_timeout: 600
    max_steps: 20
    action_ticks: 4
    capture_ticks: 2
    capture_render_frames: 2
    pov_camera_settle_ticks: 16
    pov_extra_settle_ticks: 8
    pov_settle_render_frames: 10
    capture_timeout: 90
    hide_hud: true
    refresh_pack: false
    randomize_starts: false
    start_position_jitter: 0.6
    start_yaw_jitter: 35.0
    write_debug_images: false
    keep_extra_records: true
    success_reward: 1.0
    failure_reward: 0.0
    invalid_action_penalty: 0.05
    step_penalty: 0.0
