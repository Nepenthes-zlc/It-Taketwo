#Whether to start the TickGate TCP IPC server on server startup.
ipcEnabled = true
#Host/interface to bind the IPC server to. Keep 127.0.0.1 unless you know what you're doing.
ipcHost = "127.0.0.1"
#TCP port for the IPC server.
# Default: 25575
# Range: 1 ~ 65535
ipcPort = 25590
#If true, the world starts paused (waiting for an external `resume` or `step`).
pauseOnStartup = false
#Server tick rate applied at startup (Hz). Vanilla = 20.
# Default: 20
# Range: 1 ~ 1000
defaultTickRate = 20
#Render cadence for step_observe default path. 1 means every step waits for a render frame.
# Default: 1
# Range: 1 ~ 1000000
renderCadence = 1
#Maximum n accepted by step-like IPC/command verbs.
# Default: 1000000
# Range: 1 ~ 9223372036854775807
maxStepBatch = 1000000
#If true, client tries to auto-enter a world on startup.
autoEnterWorldEnabled = true
#Auto-enter mode: loadExisting or createFromSeed
autoEnterMode = "loadExisting"
#Target world name for auto-enter.
autoWorldName = "New World"
#Seed for createFromSeed mode (string accepted).
autoWorldSeed = "1001"
#If true, createFromSeed mode uses creative mode.
autoWorldCreative = false
