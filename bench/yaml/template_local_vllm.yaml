name: replace_me
session: replace_me
output_root: bench/runs
python: /home/azvm/miniconda3/envs/verl/bin/python

model:
  name: served-model-name
  provider: openai_compatible
  api_base_url: http://127.0.0.1:3888/v1
  api_key: EMPTY

server:
  enabled: true
  model_path: /absolute/path/to/model
  cuda_visible_devices: "0"
  port: 3888
  args: [--dtype, bfloat16, --gpu-memory-utilization, "0.78", --max-model-len, "8192", --limit-mm-per-prompt, '{"image":1}']

runner:
  tasks: bench/data/0714_2_class/elevator_tasks/generated_tasks.json
  pack_src: bench/data/0714_2_class/datapacks/time_lock_difficulty_scene_pack
  bench_mode: duo-parallel
  task_indices: 0-99
  rollout_n: 4
  chunks: 1
  instance_count: 4
  workers: 4
  max_steps: 32
  cleanup_after: true
