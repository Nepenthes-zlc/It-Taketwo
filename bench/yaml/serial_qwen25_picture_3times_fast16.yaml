name: serial_qwen25_picture_3times_fast16
session: serial_qwen25_picture_3times_fast16
output_root: bench/runs
python: /home/azvm/miniconda3/envs/verl/bin/python
model:
  name: qwen2.5-vl-7b
  provider: openai_compatible
  api_base_url: http://127.0.0.1:3888/v1
  api_key: EMPTY
server:
  enabled: true
  model_path: /local_nvme/guanyiming/models/Qwen/Qwen2.5-VL-7B-Instruct
  cuda_visible_devices: 0,1,2,3
  host: 127.0.0.1
  port: 3888
  args:
  - --dtype
  - bfloat16
  - --gpu-memory-utilization
  - '0.60'
  - --data-parallel-size
  - '4'
  - --max-model-len
  - '8192'
  - --max-num-seqs
  - '32'
  - --limit-mm-per-prompt
  - '{"image":1}'
  - --disable-log-requests
env:
  IT_TAKETWO_EGL_DEVICES: egl0,egl1,egl2,egl3
  IT_TAKETWO_IMAGE_VIEW: agent_pov
runner:
  tasks: bench/data/final_data/picture/generated_tasks.json
  pack_src: bench/data/final_data/picture/datapacks/picture_scene_pack
  bench_mode: duo-parallel
  rollout_n: 3
  chunks: 1
  instance_count: 16
  workers: 16
  max_steps: 32
  episode_timeout: 1200
  capture_timeout: 30
  shot_slow_secs: 25
  prewarm_parallel: 16
  prewarm_each_chunk: false
  cleanup_after: true
  save_trace: false
  rollout_yaml: yaml/lowlevel_episode.yaml
  randomize_starts: true
  randomize_start_agents: AgentA
  start_position_jitter: 0.4
  start_yaw_jitter: 45
phases:
- name: easy
  task_indices: 0-33
- name: medium
  task_indices: 34-66
- name: hard
  task_indices: 67-99
